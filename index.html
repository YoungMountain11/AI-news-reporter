        function renderNewsGrid() {
            const grid = document.getElementById('newsGrid');
            grid.innerHTML = newsData.map(news => `
                <a href="javascript:void(0)" class="news-card" onclick="openDetail(${news.id})">
                    <span class="news-category ${news.categoryClass}">${news.category}</span>
                    <h2 class="news-title">${news.title}</h2>
                    <p class="news-summary">${news.summary}</p>
                    <div class="news-meta">
                        <span class="news-source">${news.source}</span>
                        <span class="relevance-badge ${news.relevanceClass}">${news.relevance}</span>
                    </div>
                </a>
            `).join('');
        }

        function openDetail(id) {
            const news = newsData.find(n => n.id === id);
            if (!news) return;

            const content = document.getElementById('detailContent');
            content.innerHTML = `
                <span class="detail-category">${news.category}</span>
                <h1 class="detail-title">${news.title}</h1>
                <div class="detail-meta">
                    <span class="detail-source">${news.source} · ${news.date}</span>
                    <span class="detail-relevance ${news.relevanceClass}">${news.relevance} 相关性</span>
                </div>
                <div class="detail-summary">
                    ${news.summary}
                </div>
                ${news.insight ? `
                <div class="detail-insight">
                    <h3>💡 启示</h3>
                    <p>${news.insight}</p>
                </div>
                ` : ''}
                <a href="${news.link}" class="detail-link" target="_blank" rel="noopener noreferrer">
                    查看原文 →
                </a>
            `;

            document.getElementById('detailView').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeDetail() {
            document.getElementById('detailView').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // 点击背景关闭
        document.getElementById('detailView').addEventListener('click', function(e) {
            if (e.target === this) {
                closeDetail();
            }
        });

        // ESC 键关闭
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeDetail();
            }
        });

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderNewsGrid();
            
            // 卡片入场动画
            const cards = document.querySelectorAll('.news-card');
            cards.forEach((card, index) => {
                card.style.opacity = '0';
                card.style.transform = 'translateY(30px)';
                setTimeout(() => {
                    card.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }, index * 100);
            });
        });
    </script>
